{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "agno-agentos-starter.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "agno-agentos-starter.name" . }}
    helm.sh/chart: {{ include "agno-agentos-starter.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  parentRefs:
    - name: {{ include "agno-agentos-starter.fullname" . }}
      namespace: {{ .Release.Namespace }}
  hostnames:
    {{- toYaml .Values.gateway.backend.hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - name: {{ include "agno-agentos-starter.fullname" . }}
          port: {{ .Values.service.port }}
---
{{- if .Values.frontend.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "agno-agentos-starter.frontend-fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "agno-agentos-starter.name" . }}-ui
    helm.sh/chart: {{ include "agno-agentos-starter.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  parentRefs:
    - name: {{ include "agno-agentos-starter.fullname" . }}
      namespace: {{ .Release.Namespace }}
  hostnames:
    {{- toYaml .Values.gateway.frontend.hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - name: {{ include "agno-agentos-starter.frontend-fullname" . }}
          port: {{ .Values.frontend.service.port }}
{{- end }}
{{- end }}
