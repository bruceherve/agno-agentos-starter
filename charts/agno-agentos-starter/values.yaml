# ── Shared ────────────────────────────────────────────────────────────────────

replicaCount: 1

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}

# ── Backend (FastAPI / AgentOS) ───────────────────────────────────────────────

image:
  repository: agno-agentos-starter
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: api.agno-agentos-starter.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  RUNTIME_ENV: dev
  PORT: "8000"

secretEnv:
  MODEL_API_KEY: ""
  DB_URI: ""
  JWT_VERIFICATION_KEY: ""

existingSecretName: ""

resources: {}

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# ── Frontend (Next.js UI) ─────────────────────────────────────────────────────

frontend:
  enabled: true

  image:
    repository: agno-agentos-starter-ui
    pullPolicy: IfNotPresent
    tag: latest

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: agno-agentos-starter.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  # API_URL is read by the Next.js rewrite proxy at runtime (server-side).
  # It should point to the backend service within the cluster.
  # Pattern: http://<release-name>-agno-agentos-starter:8000
  env:
    API_URL: "http://agno-agentos-starter:8000"

  resources: {}

  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
